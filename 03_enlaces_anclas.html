<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Los enlaces o anclas o hipervínculos -->
    <!-- a (anchor) significa ancla. Metáfora: como en un barco te mantiene en una ubicación específica un ancla es justamente para que el usuario sepa hacia dónde buscar un recurso o hacia dónde navegar en la página web. --> 
    
    <!-- Los atributos son características que definen el comportamiento y la apariencia de un elemento en este caso el atributo href vuelve funcional a la etiqueta es por esta razón que se utiliza en el maquetado y no en el css dado que no es una característica visual. -->
    
    <!-- href (hyper reference) es la referencia a un recurso, es decir, el destino del enlace. -->
    <!-- Lo que está dentro de la etiqueta a es el texto visible que el usuario verá en la página web. Mientras que lo que está dentro del href es la referencia al recurso al que apunta el enlace. -->
    <h2 title="titulo de la página">Enlaces o Anclas</h2>
    <!-- Por otra partem el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologías de asistencia como lectores de pantalla utilizan este atributo para proporcionar información adicional al usuario. En el caso de personas invidentes esto les permite acceder a información  adicional del enlace. -->

    <a href="https://www.google.com" title="Google">Google</a>
    <br>
    <a href="https://www.facebook.com" title="Facebook">Facebook</a>
    <br>
    <a href="https://www.youtube.com" title="Youtube">Youtube</a>
    <br>
    <a title="Ir al canal de youtube" href="https://youtube.com/@ramcrack0584">Ramcrack</a> <!-- Mala práctica: usar protocolo relativo sin especificar el protocolo. -->
    <br>
    <br>
    <a href="03-1_pagina_enlace1.html">Ir a enlace uno</a>
    <br>
    <a href="03-2_pagina_enlace2.html">Ir a enlace dos</a>
    <br>
    <a href="03-3_pagina_enlace3.html">Ir a enlace tres</a>
    <!-- Es sumamente importante que en la programación y desarrollo web se realicen las prácticas a medida que se va avanzado, de esta forma se asegura una mejor compresión y aplicación de los conceptos aprendidos. Entiendan que la programación es un proceso activo no pasivo, una cpsa es intentar comprender lo que sucede cuando leen o ven algo que se está haciendo, sin embargo, la única fprma de aprender es probando ustedes mismos todo lo que se debe implementar. -->
    <br>

    <h2>Enlaces con target a otra ventana</h2>
    <a href="03-4_pagina_enlace4.html" target="_blank">Ir a enlace cuatro en nueva ventana</a>
    <!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. Por defecto siempre esta en self que significa que se abre en la misma ventana. -->
</body>
</html>
