<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes</title>
    <!-- https://techicons.dev/icons/react -->
</head>
<body>
    <!-- Etiquetas de Bloque y Etiquetas de Línea -->
    <h1>Imágenes</h1>
    <!-- Las imágenes se insertan en HTML utilizando la etiqueta <img>. Esta etiqueta es un elemento vacío, lo que significa que no tiene una etiqueta de cierre. La sintaxis básica es: -->
    
    <!-- Vale la pena recordar que el atributo title proporciona un tooltip que se muestra cuando el usuario pasa el mouse sobre la imagen. -->
    <img src="04_imagen.png" alt="Logotipo de HTML5" title="HTML5" width="200" height="200">
    <!-- Para que los lectores de pantalla puedan saber de que trata la imagen el atributo alt (alternative text) es muy importante puesto que proporciona una descripción textual de la imagen para accesibilidad y como fallback si no se carga. El texto alternativo debe ser descriptivo y conciso, y debe transmitir la información esencial que la imagen representa. Por ejemplo, si la imagen es un logotipo de una empresa, el texto alternativo podría ser "Logotipo de la empresa XYZ". Si la imagen es una fotografia de un paisaje, el texto alternativo podría ser "Fotografia de un paisaje con montañas y un lago". En resumen, el atributo alt proporciona una descripción de la imagen en caso de que no se pueda cargar. -->

    <!-- self closing tags son etiquetas que se autocierran -->

</body>
</html>
